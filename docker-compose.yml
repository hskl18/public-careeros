services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      CAREEROS_DATA_DIR: /data
      CAREEROS_PERSISTENCE: sqlite
      CAREEROS_OLLAMA_ENABLED: "false"
      CAREEROS_OLLAMA_BASE_URL: http://host.docker.internal:11434
      CAREEROS_GEMMA_MODEL: gemma3:4b
      CAREEROS_GMAIL_CONNECTOR_ENABLED: "false"
    volumes:
      - careeros-data:/data
      - .:/app
      - /app/node_modules

volumes:
  careeros-data:
