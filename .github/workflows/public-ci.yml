name: CareerOS demo checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  check:
    name: Next.js demo checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.19.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Set up Python chart renderer
        run: python3 -m pip install matplotlib

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Public no-key release gate
        run: pnpm ci:public

      - name: Optional Ollama Cloud smoke
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          CAREEROS_OLLAMA_ENABLED: "true"
          CAREEROS_OLLAMA_BASE_URL: "https://ollama.com"
          CAREEROS_GEMMA_MODEL: "gemma4:31b"
        run: |
          if [ -z "${OLLAMA_API_KEY:-}" ]; then
            echo "OLLAMA_API_KEY secret is not configured; skipping live Ollama Cloud smoke."
            exit 0
          fi
          pnpm smoke:ollama
