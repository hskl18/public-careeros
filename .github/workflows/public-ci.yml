name: CareerOS demo checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  check:
    name: Next.js demo checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Public safety grep
        run: |
          if find . -name ".env" -o -name ".env.*" | grep -v '^./.env.example$' | grep -q .; then
            echo "Do not commit real env files." >&2
            exit 1
          fi
          if grep -RInE '/Users/ice|console\.neon\.tech|railway\.app/project|vercel\.com/.+/.+|sk-[A-Za-z0-9_-]{20,}|AIza[0-9A-Za-z_-]{20,}' . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=.next \
            --exclude-dir=.careeros-data \
            --exclude-dir=.artifacts \
            --exclude=public-ci.yml; then
            exit 1
          fi

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
